ine-2)" textLength="805.2">Manage authentication for CLI. Either pass token from environment</text><text x="0" y="93.2" class="terminal-3430150180-r2" clip-path="url(#terminal-3430150180-line-3)" textLength="597.8">variable/parameter or pass username and password.</text><text x="0" y="142" class="terminal-3430150180-r1" clip-path="url(#terminal-3430150180-line-5)" textLength="256.2">Positional Arguments:</text><text x="24.4" y="166.4" class="terminal-3430150180-r4" clip-path="url(#terminal-3430150180-line-6)" textLength="85.4">COMMAND</text><text x="48.8" y="190.8" class="terminal-3430150180-r4" clip-path="url(#terminal-3430150180-line-7)" textLength="109.8">list-envs</text><text x="170.8" y="215.2" class="terminal-3430150180-r2" clip-path="url(#terminal-3430150180-line-8)" textLength="671">List all CLI environments that the user has logged into</text><text x="48.8" y="239.6" class="terminal-3430150180-r4" clip-path="url(#terminal-3430150180-line-9)" textLength="61">login</text><text x="170.8" y="239.6" class="terminal-3430150180-r2" clip-path="url(#terminal-3430150180-line-9)" textLength="744.2">Login to the metadata database for personal usage. JWT Token</text><text x="0" y="264" class="terminal-3430150180-r2" clip-path="url(#terminal-3430150180-line-10)" textLength="378.2">must be provided via parameter.</text><text x="48.8" y="288.4" class="terminal-3430150180-r4" clip-path="url(#terminal-3430150180-line-11)" textLength="61">token</text><text x="170.8" y="288.4" class="terminal-3430150180-r2" clip-path="url(#terminal-3430150180-line-11)" textLength="683.2">Generate and print a JWT token for the given credentials</text><text x="0" y="337.2" class="terminal-3430150180-r1" clip-path="url(#terminal-3430150180-line-13)" textLength="97.6">Options:</text><text x="24.4" y="361.6" class="terminal-3430150180-r4" clip-path="url(#terminal-3430150180-line-14)" textLength="24.4">-h</text><text x="48.8" y="361.6" class="terminal-3430150180-r2" clip-path="url(#terminal-3430150180-line-14)" textLength="24.4">,</text><text x="73.2" y="361.6" class="terminal-3430150180-r4" clip-path="url(#terminal-3430150180-line-14)" textLength="73.2">--help</text><text x="170.8" y="361.6" class="terminal-3430150180-r2" clip-path="url(#terminal-3430150180-line-14)" textLength="378.2">show this help message and exit</text></g></g></svg>