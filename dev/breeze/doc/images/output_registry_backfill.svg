26,22)"><circle cx="0" cy="0" r="7" fill="#ff5f57"/><circle cx="22" cy="0" r="7" fill="#febc2e"/><circle cx="44" cy="0" r="7" fill="#28c840"/></g><g clip-path="url(#breeze-registry-backfill-clip-terminal)" transform="translate(9, 41)"><g class="breeze-registry-backfill-matrix"><text x="12.2" y="44.4" class="breeze-registry-backfill-r2" clip-path="url(#breeze-registry-backfill-line-1)" textLength="73.2">Usage:</text><text x="97.6" y="44.4" class="breeze-registry-backfill-r3" clip-path="url(#breeze-registry-backfill-line-1)" textLength="292.8">breeze registry backfill</text><text x="402.6" y="44.4" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-1)" textLength="12.2">[</text><text x="414.8" y="44.4" class="breeze-registry-backfill-r4" clip-path="url(#breeze-registry-backfill-line-1)" textLength="85.4">OPTIONS</text><text x="500.2" y="44.4" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-1)" textLength="12.2">]</text><text x="12.2" y="93.2" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-3)" textLength="1427.4">Extract metadata, parameters, and connections for older provider versions. Runs extract_versions.py (host, git tags)</text><text x="12.2" y="117.6" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-4)" textLength="1439.6">for metadata.json, then extract_parameters.py + extract_connections.py inside the Breeze CI container (or via &apos;uv run</text><text x="12.2" y="142" class="breeze-registry-backfill-r4" clip-path="url(#breeze-registry-backfill-line-5)" textLength="73.2">--with</text><text x="85.4" y="142" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-5)" textLength="85.4">&apos; with</text><text x="170.8" y="142" class="breeze-registry-backfill-r4" clip-path="url(#breeze-registry-backfill-line-5)" textLength="134.2">--no-docker</text><text x="305" y="142" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-5)" textLength="1122.4">). Each version uses an isolated providers.json, so multiple providers can be backfilled in</text><text x="12.2" y="166.4" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-6)" textLength="109.8">parallel.</text><text x="0" y="215.2" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-8)" textLength="24.4">╭─</text><text x="24.4" y="215.2" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-8)" textLength="195.2">Backfill flags</text><text x="219.6" y="215.2" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-8)" textLength="1220">────────────────────────────────────────────────────────────────────────────────────────────────────</text><text x="1439.6" y="215.2" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-8)" textLength="24.4">─╮</text><text x="0" y="239.6" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-9)" textLength="12.2">│</text><text x="61" y="239.6" class="breeze-registry-backfill-r4" clip-path="url(#breeze-registry-backfill-line-9)" textLength="292.8">--python</text><text x="378.2" y="239.6" class="breeze-registry-backfill-r6" clip-path="url(#breeze-registry-backfill-line-9)" textLength="24.4">-p</text><text x="427" y="239.6" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-9)" textLength="744.2">Python major/minor version used in Airflow image for images.</text><text x="1171.2" y="239.6" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-9)" textLength="183">[default: 3.10]</text><text x="1451.8" y="239.6" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-9)" textLength="12.2">│</text><text x="0" y="264" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-10)" textLength="12.2">│</text><text x="427" y="264" class="breeze-registry-backfill-r7" clip-path="url(#breeze-registry-backfill-line-10)" textLength="439.2">(&gt;3.10&lt; | 3.11 | 3.12 | 3.13 | 3.14)</text><text x="1451.8" y="264" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-10)" textLength="12.2">│</text><text x="0" y="288.4" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-11)" textLength="12.2">│</text><text x="24.4" y="288.4" class="breeze-registry-backfill-r8" clip-path="url(#breeze-registry-backfill-line-11)" textLength="12.2">*</text><text x="61" y="288.4" class="breeze-registry-backfill-r4" clip-path="url(#breeze-registry-backfill-line-11)" textLength="292.8">--provider</text><text x="427" y="288.4" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-11)" textLength="707.6">Provider ID (e.g. &apos;amazon&apos;, &apos;google&apos;, &apos;microsoft-azure&apos;).</text><text x="1134.6" y="288.4" class="breeze-registry-backfill-r9" clip-path="url(#breeze-registry-backfill-line-11)" textLength="122">[required]</text><text x="1268.8" y="288.4" class="breeze-registry-backfill-r7" clip-path="url(#breeze-registry-backfill-line-11)" textLength="73.2">(TEXT)</text><text x="1451.8" y="288.4" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-11)" textLength="12.2">│</text><text x="0" y="312.8" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-12)" textLength="12.2">│</text><text x="24.4" y="312.8" class="breeze-registry-backfill-r8" clip-path="url(#breeze-registry-backfill-line-12)" textLength="12.2">*</text><text x="61" y="312.8" class="breeze-registry-backfill-r4" clip-path="url(#breeze-registry-backfill-line-12)" textLength="292.8">--version</text><text x="427" y="312.8" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-12)" textLength="683.2">Version(s) to extract. Can be specified multiple times:</text><text x="1110.2" y="312.8" class="breeze-registry-backfill-r4" clip-path="url(#breeze-registry-backfill-line-12)" textLength="109.8">--version</text><text x="1220" y="312.8" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-12)" textLength="97.6">9.21.0</text><text x="1317.6" y="312.8" class="breeze-registry-backfill-r4" clip-path="url(#breeze-registry-backfill-line-12)" textLength="109.8">--version</text><text x="1451.8" y="312.8" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-12)" textLength="12.2">│</text><text x="0" y="337.2" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-13)" textLength="12.2">│</text><text x="427" y="337.2" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-13)" textLength="85.4">9.20.0</text><text x="512.4" y="337.2" class="breeze-registry-backfill-r9" clip-path="url(#breeze-registry-backfill-line-13)" textLength="122">[required]</text><text x="646.6" y="337.2" class="breeze-registry-backfill-r7" clip-path="url(#breeze-registry-backfill-line-13)" textLength="73.2">(TEXT)</text><text x="1451.8" y="337.2" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-13)" textLength="12.2">│</text><text x="0" y="361.6" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-14)" textLength="12.2">│</text><text x="61" y="361.6" class="breeze-registry-backfill-r4" clip-path="url(#breeze-registry-backfill-line-14)" textLength="146.4">--use-docker</text><text x="207.4" y="361.6" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-14)" textLength="12.2">/</text><text x="219.6" y="361.6" class="breeze-registry-backfill-r4" clip-path="url(#breeze-registry-backfill-line-14)" textLength="134.2">--no-docker</text><text x="427" y="361.6" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-14)" textLength="805.2">Run extraction in CI Docker container (default) or via uv on host.</text><text x="1451.8" y="361.6" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-14)" textLength="12.2">│</text><text x="0" y="386" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-15)" textLength="1464">╰──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────╯</text><text x="0" y="410.4" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-16)" textLength="24.4">╭─</text><text x="24.4" y="410.4" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-16)" textLength="195.2">Common options</text><text x="219.6" y="410.4" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-16)" textLength="1220">────────────────────────────────────────────────────────────────────────────────────────────────────</text><text x="1439.6" y="410.4" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-16)" textLength="24.4">─╮</text><text x="0" y="434.8" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-17)" textLength="12.2">│</text><text x="24.4" y="434.8" class="breeze-registry-backfill-r4" clip-path="url(#breeze-registry-backfill-line-17)" textLength="109.8">--verbose</text><text x="158.6" y="434.8" class="breeze-registry-backfill-r6" clip-path="url(#breeze-registry-backfill-line-17)" textLength="24.4">-v</text><text x="207.4" y="434.8" class="breeze-registry-backfill-r1" clip-path="url(#breeze-registry-backfill-line-17)" textLength="585.6">Print verbose information about performed steps.</text><text x="1451.8" y="434.8" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-17)" textLength="12.2">│</text><text x="0" y="459.2" class="breeze-registry-backfill-r5" clip-path="url(#breeze-registry-backfill-line-18)" textLe